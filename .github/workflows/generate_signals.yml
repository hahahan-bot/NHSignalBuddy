name: generate_signals

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: signal_backend/requirements.txt

      - name: Install dependencies
        run: pip install -r signal_backend/requirements.txt

      - name: Run generate_signals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python signal_backend/generate_signals.py \
            --output signal_backend/signals_latest.json

      - name: Copy to docs/
        run: cp signal_backend/signals_latest.json docs/signals_latest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/signals_latest.json
          git diff --staged --quiet || git commit -m "chore: update signals $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
